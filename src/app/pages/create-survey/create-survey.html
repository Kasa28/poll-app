<section class="create-modal" [class.publish-success]="showPublishSuccess">
  <div class="modal-head">
    <div>
      <span class="badge">Draft</span>
      <h2>Create new survey</h2>
    </div>

    <a class="cancel-btn" routerLink="/">Cancel &times;</a>
  </div>

  <div class="form-panel">
    <div class="survey-details">
      <div class="field-grid">
        <label class="survey-name-field">
          Survey name <span class="required-mark">*</span>
          <div class="input-with-icon">
            <input type="text" [(ngModel)]="surveyTitle" />
            <button
              class="ghost-icon"
              type="button"
              aria-label="Remove survey name"
              (click)="clearSurveyTitle()"
            ></button>
          </div>
        </label>

        <label class="description-field">
          Describing text <span>(optional)</span>
          <div class="input-with-icon">
            <textarea [(ngModel)]="surveyDescription"></textarea>
            <button
              class="ghost-icon"
              type="button"
              aria-label="Remove description"
              (click)="clearSurveyDescription()"
            ></button>
          </div>
        </label>

        <label class="end-date-field">
          Set end date <span></span>
          <div class="date-row">
            <div
              class="input-with-icon small-input"
              (click)="openDatePicker(endDateInput)"
            >
              <input
                #endDateInput
                type="datetime-local"
                [(ngModel)]="surveyEndDate"
                (focus)="openDatePicker(endDateInput)"
                (keydown)="$event.preventDefault()"
                (paste)="$event.preventDefault()"
                step="60"
              />
              <button
                class="calendar-trigger"
                type="button"
                aria-label="Open calendar"
                (click)="openDatePicker(endDateInput); $event.stopPropagation()"
              >
                &#128197;
              </button>
            </div>
            <button
              class="ghost-icon"
              type="button"
              aria-label="Remove end date"
              (click)="clearSurveyEndDate()"
            ></button>
          </div>
        </label>

        <div class="category-field">
          <button class="category-btn" type="button" (click)="toggleCategoryMenu()">
            Choose category
            <span class="caret">{{ isCategoryMenuOpen ? '▲' : '▼' }}</span>
          </button>
          <span class="selected-category" *ngIf="selectedCategory">{{ selectedCategory }}</span>

          <div class="category-menu" *ngIf="isCategoryMenuOpen">
            <button
              *ngFor="let category of categories; trackBy: trackByIndex"
              type="button"
              class="category-option"
              (click)="selectCategory(category)"
            >
              {{ category }}
            </button>
          </div>
        </div>
      </div>
    </div>

    <div class="questions-layout" [class.has-extra-questions]="questions.length > 1">
      <section
        class="question-card"
        *ngFor="let question of questions; let questionIndex = index; trackBy: trackByIndex"
      >
        <label class="question-label">
          {{ questionIndex + 1 }}. Question
          <div class="input-with-icon">
            <input
              type="text"
              [(ngModel)]="question.text"
              [placeholder]="getQuestionPlaceholder(questionIndex)"
            />
            <button
              class="ghost-icon"
              type="button"
              aria-label="Delete question"
              (click)="removeQuestion(questionIndex)"
            ></button>
          </div>
        </label>

        <div class="answers-head">
          <strong>Answers <span class="required-mark">*</span></strong>

          <label class="answers-toggle">
            <input type="checkbox" [(ngModel)]="question.allowMultiple" />
            Allow multiple answers.
          </label>
        </div>

        <p class="answer-hint">
          {{ getSelectionHint(question) }}
        </p>

        <label
          class="answer-line"
          *ngFor="let answer of question.answers; let answerIndex = index; trackBy: trackByIndex"
        >
          <span class="answer-label">{{ getAnswerLabel(answerIndex) }}</span>
          <div class="input-with-icon">
            <input type="text" [(ngModel)]="question.answers[answerIndex]" />
            <button
              class="ghost-icon"
              type="button"
              aria-label="Remove answer"
              (click)="clearAnswer(questionIndex, answerIndex)"
            ></button>
          </div>
        </label>

        <div class="question-actions">
          <button class="link-btn" type="button" (click)="addAnswer(questionIndex)">
            Add answer &#8853;
          </button>

          <span class="answer-hint" *ngIf="question.answers.length > 2">
            You can add up to 6 answer fields.
          </span>
        </div>
      </section>

      <div class="add-question-panel full-width">
        <button class="add-question-btn" type="button" (click)="addNextQuestion()">
          <span>Add next question</span>
          <span class="add-question-btn-icon" aria-hidden="true">+</span>
        </button>
      </div>
    </div>
  </div>

  <button
    class="publish-btn"
    type="button"
    [disabled]="isPublishing"
    (click)="publishSurvey()"
  >
    <span>Publish</span>
    <span class="publish-btn-check" *ngIf="canPublish" aria-hidden="true">&#10003;</span>
  </button>

  <p class="publish-error" *ngIf="publishError">
    {{ publishError }}
  </p>

  <div class="publish-success-overlay" *ngIf="showPublishSuccess"></div>

  <aside class="publish-success-toast" *ngIf="showPublishSuccess">
    <p>Your survey is now published</p>
    <button type="button" aria-label="Close message" (click)="showPublishSuccess = false">&times;</button>
  </aside>
</section>
